<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Billet - RAJA vs FUS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .ticket {
    background: #fff;
    width: 100%;
    max-width: 430px;
    min-height: 100vh;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  /* Close button */
  .close-btn {
    position: absolute;
    top: 18px;
    right: 18px;
    background: none;
    border: none;
    font-size: 22px;
    color: #222;
    cursor: pointer;
    font-weight: 300;
    line-height: 1;
    z-index: 10;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 20px 0 20px;
    font-size: 13px;
    color: #555;
  }

  /* Teams */
  .teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 32px 10px;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .team img {
    width: 70px;
    height: 70px;
    object-fit: contain;
  }

  .team-name {
    font-weight: 500;
    font-size: 14px;
    color: #333;
    letter-spacing: 0.3px;
  }

  .match-center {
    text-align: center;
    flex: 1;
  }

  .match-center .label {
    font-size: 13px;
    color: #999;
    font-weight: 400;
    margin-bottom: 4px;
  }

  .match-center .time {
    font-size: 38px;
    font-weight: 600;
    color: #222;
    letter-spacing: 0.5px;
  }

  /* QR section */
  .qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px 20px;
    background: #f7f7f7;
    margin: 10px 16px;
    border-radius: 16px;
  }

  .qr-blurred-wrapper {
    position: relative;
    width: 200px;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0;
  }

  #qrcode {
    filter: none;
    opacity: 1;
  }

  #qrcode canvas {
    display: block;
  }

  .security-line {
    position: absolute;
    right: -10px;
    top: 50%;
    transform: translateY(-50%);
    width: 3px;
    height: 60px;
    background: #1a8a5a;
    border-radius: 2px;
  }

  .security-text {
    text-align: center;
    padding: 18px 20px 0;
    font-size: 15px;
    font-weight: 600;
    color: #111;
    line-height: 1.5;
  }

  /* Green details box */
  .details-box {
    background: #2e7d4f;
    border-radius: 18px;
    margin: 16px 16px 16px;
    padding: 22px 22px 16px;
    color: #fff;
    flex: 1;
  }

  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 18px 10px;
    margin-bottom: 20px;
  }

  .detail-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .detail-label {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    font-weight: 400;
  }

  .detail-value {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  /* Bottom bar inside green box */
  .details-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 8px;
  }

  .live-timer {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    font-variant-numeric: slashed-zero tabular-nums;
  }

  .live-dot {
    width: 8px;
    height: 8px;
    background: #fff;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .awew-btn {
    background: rgba(0,0,0,0.35);
    color: rgba(255,255,255,0.8);
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
  }

  /* Transfer button */
  .transfer-section {
    padding: 0 16px 30px;
  }

  .transfer-btn {
    width: 100%;
    background: #2e7d4f;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 17px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
  }

  .footer-text {
    text-align: center;
    font-size: 13px;
    color: #1a8a5a;
    font-weight: 700;
  }

  .footer-sub {
    text-align: center;
    font-size: 12px;
    color: #999;
    margin-top: 3px;
  }

</style>
</head>

<script>
  function generateQR() {
    document.getElementById("qrcode").innerHTML = '';
    new QRCode(document.getElementById("qrcode"), {
      text: "RAJA-FUS-20260426-TRIBUNE-EST-NORD-ZONE6-AS-8-" + Date.now(),
      width: 190,
      height: 190,
      colorDark: "#000",
      colorLight: "#fff",
      correctLevel: QRCode.CorrectLevel.H
    });
  }

  generateQR();

  // Countdown + progress bar
  let secs = 45;
  const countdownEl = document.getElementById('countdown');
  const progressBar = document.getElementById('progressBar');

  function updateCountdown() {
    const m = String(Math.floor(secs / 60)).padStart(2, '0');
    const s = String(secs % 60).padStart(2, '0');
    countdownEl.textContent = m + ':' + s;
    progressBar.style.width = ((secs / 45) * 100) + '%';
    if (secs <= 0) {
      secs = 45;
      generateQR();
    } else {
      secs--;
    }
  }
  updateCountdown();
  setInterval(updateCountdown, 1000);

  // Live timer counting up
  let h = 20, m = 12, s = 49;
  const timerEl = document.getElementById('timer');

  setInterval(() => {
    s++;
    if (s >= 60) { s = 0; m++; }
    if (m >= 60) { m = 0; h++; }
    if (h >= 24) { h = 0; }
    timerEl.textContent = 
      String(h).padStart(2,'0') + ':' +
      String(m).padStart(2,'0') + ':' +
      String(s).padStart(2,'0');
  }, 1000);

  // Close button
  document.querySelector('.close-btn').addEventListener('click', () => {
    window.history.back();
  });
</script>
