<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Billet - RAJA vs OCS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .card {
    background: #fff;
    border-radius: 20px;
    width: 340px;
    padding: 20px;
    box-shadow: 0 4px 30px rgba(0,0,0,0.12);
    position: relative;
  }

  .close-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 32px;
    height: 32px;
    border: 2px solid #333;
    border-radius: 8px;
    background: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: #333;
    font-weight: bold;
  }

  .meta {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #666;
    margin-top: 8px;
    padding-top: 8px;
  }

  .teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 20px 0 16px;
  }

  .team {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .team img {
    width: 52px;
    height: 52px;
    object-fit: contain;
    background: transparent;
  }

  .team-name {
    font-weight: 700;
    font-size: 13px;
    color: #222;
    letter-spacing: 0.5px;
  }

  .match-time {
    text-align: center;
  }

  .match-time .label {
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }

  .match-time .time {
    font-size: 34px;
    font-weight: 700;
    color: #111;
    letter-spacing: 1px;
  }

  .qr-wrapper {
    display: flex;
    justify-content: center;
    margin: 4px 0 12px;
  }

  .qr-box {
    background: #fff;
    border-radius: 14px;
    padding: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    display: inline-block;
  }

  #qrcode canvas, #qrcode img {
    display: block;
    border-radius: 4px;
  }

  .progress-bar-container {
    height: 4px;
    background: #e0e0e0;
    border-radius: 2px;
    margin: 8px 0 10px;
    overflow: hidden;
    width: 40%;
  }

  .progress-bar {
    height: 100%;
    background: #1a8a5a;
    border-radius: 2px;
    width: 60%;
    animation: progress 45s linear infinite;
  }

  @keyframes progress {
    from { width: 100%; }
    to { width: 0%; }
  }

  .refresh-text {
    font-size: 13px;
    color: #444;
    text-align: center;
    margin-bottom: 16px;
  }

  .refresh-text span {
    color: #00aacc;
    font-weight: 600;
  }

  #countdown {
    color: #00aacc;
    font-weight: 600;
  }

  .details-box {
    background: #f0f5f2;
    border-radius: 14px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 18px;
  }

  .detail-item {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .detail-item.full {
    grid-column: span 1;
  }

  .detail-label {
    font-size: 11px;
    color: #888;
    text-align: center;
  }

  .detail-value {
    font-size: 14px;
    font-weight: 700;
    color: #111;
    text-align: center;
  }

  .transfer-btn {
    width: 100%;
    background: #1a6e4a;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 16px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  .transfer-btn:hover {
    background: #155a3c;
  }

  .transfer-btn svg {
    width: 18px;
    height: 18px;
  }

  .footer-text {
    text-align: center;
    font-size: 12px;
  }

  .footer-text .main {
    color: #1a8a5a;
    font-weight: 700;
    font-size: 13px;
  }

  .footer-text .sub {
    color: #888;
    margin-top: 2px;
  }
</style>
</head>
